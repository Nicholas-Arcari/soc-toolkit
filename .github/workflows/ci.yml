name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8.4

      - name: Install dependencies
        working-directory: ./backend
        run: poetry install --no-interaction

      - name: Lint with Ruff
        working-directory: ./backend
        run: poetry run ruff check .

      - name: Type check with MyPy (strict)
        working-directory: ./backend
        run: poetry run mypy .

      - name: Security scan with Bandit
        working-directory: ./backend
        run: poetry run bandit -r . -c pyproject.toml

      - name: Audit dependencies with pip-audit
        working-directory: ./backend
        run: poetry run pip-audit --ignore-vuln PYSEC-2022-42969 || true

      # Coverage gate: start conservative at 30% baseline (current state has
      # untested middleware, exports, integrations). Tighten progressively as
      # more tests are added - goal is 70% for a production SOC tool.
      - name: Run tests with coverage gate
        working-directory: ./backend
        run: poetry run pytest --cov --cov-report=term-missing --cov-fail-under=30
