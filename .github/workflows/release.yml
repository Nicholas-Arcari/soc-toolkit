# Tagged releases ship four GHCR images (soc-backend, soc-frontend,
# osint-backend, osint-frontend), SPDX SBOMs per image, and a GitHub
# release with auto-generated notes. Triggered by pushing an annotated
# tag matching vX.Y.Z - CI on main still runs the lint/test/build matrix
# separately (ci.yml).
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build - must already exist on the repo"
        required: true

permissions:
  contents: write
  packages: write
  # Trivy uploads its SARIF report to the GitHub Security tab - needs
  # security-events: write on the workflow token.
  security-events: write
  # Cosign keyless signing + SLSA provenance attestation both mint a
  # short-lived OIDC token from GitHub's issuer. Without this the
  # `cosign sign` step fails to fetch an identity from Sigstore.
  id-token: write
  # build-push-action's provenance attestation writes alongside the
  # manifest, which requires push to the attestation subject.
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # All four images build from the monorepo root - soc-backend
          # depends on sec-common via path, frontends need workspace
          # resolution, and osint-backend has its own path dependency.
          - image: soc-backend
            context: .
            dockerfile: ./packages/soc-toolkit/backend/Dockerfile
          - image: soc-frontend
            context: .
            dockerfile: ./packages/soc-toolkit/frontend/Dockerfile
          - image: osint-backend
            context: .
            dockerfile: ./packages/osint-toolkit/backend/Dockerfile
          - image: osint-frontend
            context: .
            dockerfile: ./packages/osint-toolkit/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          # Let the user retry a published tag via workflow_dispatch
          # without tripping over the default "fetch whatever triggered me".
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Keyless cosign - no private key material in the repo or in
      # Actions secrets. The installer lands the binary on PATH; the
      # actual signing happens after push, against the published
      # digest, using the GitHub OIDC token as the signer identity.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # SLSA build-level 2 provenance attestation pushed alongside
          # the image manifest - consumers can trace the image back to
          # this workflow run, commit, and builder identity. `mode=max`
          # includes the full build context + source ref in the
          # attestation, which is what SLSA L2 wants.
          provenance: mode=max
          # Buildx SBOM attestation (syft-based) - complementary to the
          # release-artifact SBOM generated below. Consumers who pull
          # the image can verify the SBOM with `cosign verify-attestation`
          # without needing the GitHub release.
          sbom: true
          # Cross-job buildx cache: keyed on {image, ref} so concurrent
          # matrix runs don't clobber each other's layers.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      # Keyless signature on the pushed digest. The OIDC identity
      # encoded in the signature is `https://github.com/<repo>/.github/workflows/release.yml@<tag>`,
      # which consumers verify against with `cosign verify --certificate-identity-regexp`.
      # Binding to the digest (not the tag) means a later tag retag cannot
      # inherit this signature silently.
      - name: Sign image with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE: ghcr.io/${{ github.repository }}-${{ matrix.image }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      # SPDX SBOM per image pinned by digest - reproducible and immune to
      # tag races. Consumers get a manifest of every package baked into
      # the published image, including base-image layers.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}-${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json
          upload-release-assets: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.spdx.json
          retention-days: 90

      # CVE scan on the published image. Non-blocking - findings surface
      # in the GitHub Security tab (via SARIF) rather than failing the
      # release, so a known base-image CVE doesn't gate a shipable code
      # change. Flip `exit-code: 1` once the baseline is clean if you
      # want the release to stop on new criticals.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}-${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

  github-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only create a release for real tag pushes - manual re-runs just
    # rebuild the images and regenerate SBOM artifacts.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          merge-multiple: true
          path: sboms/

      - name: Create GitHub release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            sboms/*.spdx.json
