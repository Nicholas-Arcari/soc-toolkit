version: 2

# Weekly bumps for every workspace + CI. Pinned to Monday 06:00 UTC so
# the PR backlog lands before the working week instead of scattered across
# the weekend. Keep `open-pull-requests-limit` low - piled-up dependency
# PRs age into bit-rot.
#
# Grouping strategy: bundle minor/patch bumps within a toolchain family
# (test runners, linters, React, Vite) into one PR so a Monday-morning
# review isn't 20 separate "bump vitest patch" PRs. Majors stay un-grouped
# so each one can be reviewed on its own.
updates:
  - package-ecosystem: pip
    directory: /packages/sec-common/python
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - sec-common
    groups:
      dev-tooling:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /packages/soc-toolkit/backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - soc-toolkit
    groups:
      dev-tooling:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /packages/osint-toolkit/backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - osint-toolkit
    groups:
      dev-tooling:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /packages/soc-toolkit/frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - soc-toolkit
    groups:
      react:
        patterns:
          - "react"
          - "react-*"
          - "@types/react*"
        update-types:
          - minor
          - patch
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
          - "globals"
        update-types:
          - minor
          - patch
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "jsdom"
        update-types:
          - minor
          - patch
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /packages/osint-toolkit/frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - osint-toolkit
    groups:
      react:
        patterns:
          - "react"
          - "react-*"
          - "@types/react*"
        update-types:
          - minor
          - patch
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
          - "globals"
        update-types:
          - minor
          - patch
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "jsdom"
        update-types:
          - minor
          - patch
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
        update-types:
          - minor
          - patch
      i18n:
        patterns:
          - "i18next"
          - "i18next-*"
          - "react-i18next"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /packages/sec-common/frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - sec-common
    groups:
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
          - "globals"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /packages/soc-toolkit/backend
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /packages/osint-toolkit/backend
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /packages/soc-toolkit/frontend
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /packages/osint-toolkit/frontend
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
