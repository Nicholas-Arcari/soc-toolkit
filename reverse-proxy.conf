# Reverse proxy for the monorepo's custom HTTPS domains.
#
# Terminates TLS with mkcert certs and routes by hostname (SNI) to each
# frontend, which in turn proxies /api to its own backend. Runs on the
# nginx:alpine image already cached locally, so it needs no registry pull.
#
# Prereqs on the host (run once):
#   mkcert -install
#   mkdir -p certs
#   mkcert -cert-file certs/soctoolkit.pem   -key-file certs/soctoolkit-key.pem   soctoolkit
#   mkcert -cert-file certs/osinttoolkit.pem -key-file certs/osinttoolkit-key.pem osinttoolkit
#   echo "127.0.0.1 soctoolkit osinttoolkit" | sudo tee -a /etc/hosts

# Plain HTTP -> redirect to HTTPS for both domains.
server {
    listen 80;
    server_name soctoolkit osinttoolkit;
    return 301 https://$host$request_uri;
}

# SOC Toolkit
server {
    listen 443 ssl;
    server_name soctoolkit;

    ssl_certificate     /certs/soctoolkit.pem;
    ssl_certificate_key /certs/soctoolkit-key.pem;

    location / {
        proxy_pass http://soc-frontend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 50M;
    }
}

# OSINT Toolkit
server {
    listen 443 ssl;
    server_name osinttoolkit;

    ssl_certificate     /certs/osinttoolkit.pem;
    ssl_certificate_key /certs/osinttoolkit-key.pem;

    location / {
        proxy_pass http://osint-frontend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 50M;
    }
}
