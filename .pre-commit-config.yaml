# Pre-commit hooks: run the same checks the CI runs, but locally before each
# commit. Catches Ruff/MyPy/Bandit errors before they reach GitHub Actions.
#
# Install once per clone:   pre-commit install
# Run manually on all files: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/
        args: [--ignore-missing-imports, --disallow-untyped-defs]
        additional_dependencies:
          - pydantic
          - sqlalchemy
          - types-requests

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-c, backend/pyproject.toml]
        files: ^backend/
        exclude: ^backend/tests/
        additional_dependencies: ["bandit[toml]"]
