server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ----------------------------------------------
    # Applied at server scope so every response (HTML, JS, CSS, API proxy)
    # inherits them. `always` on add_header means they are emitted even on
    # 4xx/5xx responses, which is what a hardening audit looks for.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # CSP: bundle is fully self-hosted (Vite hashes JS/CSS), Tailwind emits
    # inline <style> during hydration so style-src keeps 'unsafe-inline'.
    # API calls proxy through /api/ on the same origin so connect-src
    # stays 'self'.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://osint-backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
