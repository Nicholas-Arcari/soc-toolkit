[tool.poetry]
name = "sec-common"
version = "0.1.0"
description = "Shared primitives for sec-toolkit apps: HTTP client, rate limiting, cache, IOC extraction, external API integrations"
authors = ["Nicholas Arcari <arcari.nicholas0@gmail.com>"]
license = "MIT"
# Intentionally no `readme` field - sec-common is consumed as a path
# dependency inside the monorepo. If this package is ever published to
# PyPI, add a package-local README.md and point at it here.
packages = [{ include = "sec_common" }]

[tool.poetry.dependencies]
python = "^3.12"
httpx = "^0.28.0"
pydantic = "^2.10.0"
pydantic-settings = "^2.7.0"
sqlalchemy = "^2.0.0"
ioc-finder = "^7.3.0"
python-whois = "^0.9.0"
ipwhois = "^1.3.0"
dnspython = "^2.7.0"
structlog = "^24.4.0"
# Starlette is pulled transitively by FastAPI in downstream apps. We
# depend on it directly so `sec_common.logging.RequestIDMiddleware`
# resolves when sec-common is installed on its own (e.g. for tests).
starlette = ">=0.37.0,<1"
# JWT auth + password hashing. PyJWT is the canonical library; bcrypt
# (direct, no passlib) keeps the transitive tree small.
pyjwt = "^2.10.0"
bcrypt = ">=4.2,<6.0"
prometheus-client = "^0.21.0"
# Auth router + Prometheus instrumentation use APIRouter; keeping the
# dep here avoids forcing every consuming app to re-export a router
# factory, and FastAPI is already transitive via both backends.
fastapi = "^0.115.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.0"
pytest-asyncio = "^0.24.0"
pytest-cov = "^6.0.0"
respx = "^0.22.0"
ruff = "^0.8.0"
mypy = "^1.13.0"
bandit = "^1.8.0"
pip-audit = "^2.7.0"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
disallow_untyped_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
strict_equality = true
no_implicit_optional = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["sec_common"]
omit = ["*/tests/*", "*/__init__.py"]

[tool.coverage.report]
show_missing = true
precision = 2
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]

[tool.bandit]
exclude_dirs = ["tests", ".venv"]
skips = ["B101"]  # assert_used: pytest relies on assert statements

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
