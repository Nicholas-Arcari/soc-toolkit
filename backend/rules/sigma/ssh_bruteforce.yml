title: SSH Brute Force - Failed Password Burst
id: 7b2a4c3e-ssh-bruteforce-burst
status: stable
description: |
  Single SSH auth failure for an invalid user. On its own this is low-signal,
  but our log analyzer aggregates these and the alert engine escalates when
  the same source IP exceeds 10/min. MITRE ATT&CK T1110.001.
references:
  - https://attack.mitre.org/techniques/T1110/001/
author: SOC Toolkit
date: 2026/04/13
logsource:
    product: linux
    service: ssh
detection:
    selection:
        event_type: auth_failure
        reason: invalid_user
    condition: selection
fields:
    - source_ip
    - username
level: medium
tags:
    - attack.credential_access
    - attack.t1110.001
